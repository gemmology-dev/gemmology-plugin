name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Dependency review for PRs (security check)
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Dependency Review
        uses: actions/dependency-review-action@4901385134134e04cec5fbe5ddfe3b2c5bd5d976 # v4
        with:
          fail-on-severity: high
          # Deny licenses that are incompatible with MIT
          deny-licenses: GPL-3.0, AGPL-3.0

  # Test across Python versions
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install "gemmology-cdl-parser @ git+https://github.com/gemmology-dev/cdl-parser.git"
          pip install "gemmology-mineral-database @ git+https://github.com/gemmology-dev/mineral-database.git"
          pip install "gemmology-crystal-geometry @ git+https://github.com/gemmology-dev/crystal-geometry.git"
          pip install "gemmology-crystal-renderer @ git+https://github.com/gemmology-dev/crystal-renderer.git"
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=src/gemmology_plugin --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@e28ff129e5465c2c0dcc6f003fc735cb6ae0c673 # v4
        with:
          files: ./coverage.xml
          flags: gemmology-plugin
          name: gemmology-plugin-py311
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Lint and type check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install "gemmology-cdl-parser @ git+https://github.com/gemmology-dev/cdl-parser.git"
          pip install "gemmology-mineral-database @ git+https://github.com/gemmology-dev/mineral-database.git"
          pip install "gemmology-crystal-geometry @ git+https://github.com/gemmology-dev/crystal-geometry.git"
          pip install "gemmology-crystal-renderer @ git+https://github.com/gemmology-dev/crystal-renderer.git"
          pip install ruff mypy

      - name: Lint with Ruff
        run: ruff check . --output-format=github

      - name: Check formatting with Ruff
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy src/

  # Coverage gate - enforce minimum coverage
  coverage-gate:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install "gemmology-cdl-parser @ git+https://github.com/gemmology-dev/cdl-parser.git"
          pip install "gemmology-mineral-database @ git+https://github.com/gemmology-dev/mineral-database.git"
          pip install "gemmology-crystal-geometry @ git+https://github.com/gemmology-dev/crystal-geometry.git"
          pip install "gemmology-crystal-renderer @ git+https://github.com/gemmology-dev/crystal-renderer.git"
          pip install pytest pytest-cov
          pip install -e .

      - name: Check coverage threshold
        # Target: 60%, Current threshold: 40% (baseline - cli.py needs tests)
        run: pytest --cov=src/gemmology_plugin --cov-report=term-missing --cov-fail-under=40

      - name: Coverage report
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Current threshold: **40%** (Target: 60%)" >> $GITHUB_STEP_SUMMARY
