# Reusable workflow: Publish to PyPI on release
# Usage: Copy to each Python package repo's .github/workflows/

name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # For trusted publishing
      contents: write   # For uploading release assets

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b54f72e44af3571922400088 # release/v1
        # Uses trusted publishing - no token needed if configured
        # Fallback to token-based auth:
        # with:
        #   password: ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} dist/*
